apiVersion: vais.agents/v1
kind: ContainerPlugin
metadata:
  id: quickstart-python-planner
  version: "1.0"
  description: Python planner agent — decomposes queries into sub-questions.
spec:
  image: vais-quickstart-planner:1.0
  port: 8090   # not 8080 — the runtime container already binds host:8080
  build:
    context: ../../
    dockerfile: samples/quickstart-python-planner/Dockerfile
