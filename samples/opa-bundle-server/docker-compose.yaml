###############################################################################
# OPA bundle-server local-dev stack
#
# Prerequisites:
#   1. Build the bundle:
#        ./sign-bundle.sh --sign     # signed (recommended)
#        # or: ./sign-bundle.sh       # unsigned (skip signing config below)
#
#   2. Start the stack:
#        docker compose up --build
#
# What runs:
#   bundle-server  — nginx on :8888 serving bundle.tar.gz
#   opa            — OPA 1.15.2 in server mode, polling the bundle server
#
# After startup:
#   curl http://localhost:8181/v1/data/vais/agents/allow \
#        -H 'Content-Type: application/json' \
#        -d '{"input":{"schemaVersion":"1","operation":"Invoke","principal":{"id":"u1","tenantId":"t1"},"agent":null}}'
###############################################################################

services:

  bundle-server:
    build: .
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8888/ready"]
      interval: 5s
      timeout: 3s
      retries: 5

  opa:
    image: openpolicyagent/opa:1.15.2
    depends_on:
      bundle-server:
        condition: service_healthy
    command:
      - "run"
      - "--server"
      - "--addr=:8181"
      - "--log-format=json"
      - "--config-file=/config/config.yaml"
    ports:
      - "8181:8181"
    configs:
      - source: opa-config
        target: /config/config.yaml
    # Uncomment and set OPA_BUNDLE_SIGNING_KEY if using a signed bundle:
    # environment:
    #   OPA_BUNDLE_SIGNING_KEY: "<contents of bundle-signing-pub.pem>"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8181/health"]
      interval: 5s
      timeout: 3s
      retries: 10

configs:
  opa-config:
    content: |
      services:
        vais-bundle-server:
          url: http://bundle-server:8888
      bundles:
        vais-agents:
          service: vais-bundle-server
          resource: /bundle.tar.gz
          polling:
            min_delay_seconds: 30
            max_delay_seconds: 60
      # Uncomment and set the key below to enable signature verification:
      # bundles:
      #   vais-agents:
      #     signing:
      #       keyid: vais-bundle-key
      # keys:
      #   vais-bundle-key:
      #     algorithm: RS256
      #     key: "${OPA_BUNDLE_SIGNING_KEY}"
