apiVersion: vais.agents/v1
kind: Extension
metadata:
  name: ext-log-python
  version: "0.1.0"
  description: "Python port of ext-log-csharp. Logs every agent input turn and LLM response."
  labels:
    team: platform
    sample: "true"
spec:
  host: container
  image: ext-log-python:local
  port: 8080
  topology: standalone
  startupTimeoutSeconds: 30
  invokeTimeoutSeconds: 5
  handlers:
    - id: log-input
      seam: agentInput
      priority: 900
      failureMode: log
    - id: log-output
      seam: agentOutput
      priority: 900
      failureMode: log
