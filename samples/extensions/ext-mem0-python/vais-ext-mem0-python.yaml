apiVersion: vais.agents/v1
kind: Extension
metadata:
  name: ext-mem0-python
  version: "0.1.0"
  description: "Illustrative Mem0-style memory extension. See main.py for caveats."
  labels:
    team: platform
    sample: "true"
spec:
  host: container
  image: ext-mem0-python:local
  port: 8081
  topology: standalone
  startupTimeoutSeconds: 30
  invokeTimeoutSeconds: 10
  handlers:
    - id: load
      seam: agentInput
      priority: 200
      failureMode: skip
    - id: extract
      seam: agentOutput
      priority: 200
      failureMode: skip
