# Default values for vais-agents-runtime.
# Override with `helm install ... --set key=value` or a custom values.yaml.
#
# See ./README.md for the canonical values reference + three deploy patterns
# (localhost, clustered, clustered + OPA).

# Container image to deploy. The image is built locally from
# `oss/agentic/src/Vais.Agents.Runtime.Host/Dockerfile` and pushed to a
# consumer-controlled registry; no public image pipeline in v0.16.
image:
  repository: vais-agents-runtime
  tag: 0.16.0-preview
  pullPolicy: IfNotPresent

# Pod replica count. localhost mode must be 1 (single-silo, memory-backed);
# clustered mode scales horizontally.
replicaCount: 1

# Hosting mode. `localhost` = in-process Orleans silo (memory clustering +
# memory grain storage + memory streams); zero external deps. `clustered` =
# Orleans silo joins a shared cluster via `clustering.backend`.
hosting:
  mode: localhost  # localhost | clustered

# Clustering backend. Ignored in localhost mode.
clustering:
  backend: redis  # redis | postgres
  # Required when mode=clustered. Plain-string connection for simple installs;
  # use `clustering.existingSecret` instead for production to avoid putting
  # credentials in values.yaml.
  connectionString: ""
  # Optional: pull the connection string from an existing Secret instead of
  # inlining it above. When set, the chart wires it as a secretKeyRef; the
  # inline `connectionString` is ignored.
  existingSecret: ""
  existingSecretKey: "connection-string"

# Optional OPA policy engine. Off-by-default → the runtime logs
# "opa=disabled (AllowAll)" on startup and every verb is allowed. Enable this
# to either spin up a pod-local sidecar (when baseUrl is empty) or point at
# an external OPA service (when baseUrl is set).
opa:
  enabled: false
  # External OPA URL — overrides the sidecar. Leave empty to run a sidecar
  # container in this pod on localhost:8181.
  baseUrl: ""
  # Sidecar image (ignored when baseUrl is set).
  image: openpolicyagent/opa:1.15.2
  imagePullPolicy: IfNotPresent
  # Closed = deny on OPA failure (default; enterprise-safe). Open = allow on
  # failure.
  failMode: Closed
  # Rego data path queried by the adapter — defaults to the canonical
  # `vais/agents/allow` in the Rego samples under `samples/opa-policies/`.
  dataPath: vais/agents/allow
  # Inline Rego to render into an auto-generated ConfigMap. Ignored if
  # `configMapName` is set. Shipped as a convenience for quick demos; real
  # gating should live in `configMapName`.
  policy: |
    package vais.agents
    default allow := {"allowed": true}
  # Pre-existing ConfigMap containing one or more `*.rego` keys. Takes
  # precedence over `policy` when set.
  configMapName: ""

  # Bundle server configuration. Applies only when running the pod-local OPA
  # sidecar (opa.enabled=true and opa.baseUrl empty). When enabled, the sidecar
  # polls a bundle server instead of loading Rego from a ConfigMap.
  # Consumers pointing at an external OPA manage that OPA's bundle config directly.
  bundle:
    enabled: false
    # Bundle server URL including protocol, host, and port.
    # Example: http://opa-bundles.vais-agents.svc:8888
    url: ""
    # Path on the bundle server to the bundle archive.
    resource: /bundle.tar.gz
    # Polling interval bounds. OPA jitters between min and max.
    polling:
      minDelaySeconds: 60
      maxDelaySeconds: 120
    # Optional bearer-token auth for the bundle server.
    # Reference an existing K8s Secret; the token is injected as the
    # BUNDLE_SERVER_TOKEN env var and substituted into the OPA config at startup.
    serviceAuthTokenSecret: ""
    serviceAuthTokenSecretKey: token
    # Bundle signature verification. When enabled, OPA refuses to load bundles
    # that are not signed with the configured key.
    signing:
      enabled: false
      # Key identifier. Must match the --signing-key-id used with `opa sign`.
      keyId: vais-bundle-key
      # Signing algorithm: RS256 (RSA, default) | ES256 (ECDSA) | HS256 (HMAC).
      algorithm: RS256
      # Reference to an existing K8s Secret containing the PEM-encoded public key
      # (RS256/ES256) or HMAC secret (HS256). The value is injected as the
      # OPA_BUNDLE_SIGNING_KEY env var and substituted into the OPA config at startup.
      existingSecret: ""
      existingSecretKey: key.pem

# Optional observability sinks. Both off unless configured.
observability:
  otel:
    # OTLP/gRPC endpoint. Example: http://otel-collector.monitoring.svc:4317
    endpoint: ""
    # Set to true to additionally emit traces + metrics to the console (noisy
    # — intended for debug sessions, not production).
    console: false
  langfuse:
    # Project label attached to enrichment traces. Pillar B+ expands this to
    # full Langfuse authentication; v0.16 only tags.
    project: ""

# Optional plugin mount-point. Pillar A bakes the `/var/lib/vais/plugins`
# convention in the container image; Pillar C (v0.18) ships the loader. Until
# then this is a no-op — keep it disabled unless you're tracking the
# forthcoming Pillar C contract.
plugins:
  enabled: false
  # When enabled:
  #   - `persistentVolumeClaimName` set → mount that PVC
  #   - `persistentVolumeClaimName` empty → emptyDir (ephemeral; not a real
  #     plugin story, but keeps the mount shape stable for Pillar C).
  persistentVolumeClaimName: ""
  # Python plugin hot-reload policy. Set to DrainAndSwap to enable the
  # filesystem watcher and source-push endpoint. Safe to enable on
  # Kubernetes: the watcher is a no-op if nothing changes files.
  pythonReloadPolicy: ""   # "" | DrainAndSwap
  # C# plugin hot-reload policy. Set to DrainAndSwap to enable the filesystem
  # watcher and DLL-push endpoint (POST /v1/plugins/{name}/dll). Safe to enable
  # on Kubernetes: the watcher is a no-op if nothing changes files.
  csharpReloadPolicy: ""   # "" | DrainAndSwap

# Code-mode (the ScriptRuntime sandbox). Off by default. When enabled, a hardened
# script-runtime sidecar is co-located in the runtime pod; the runtime is told to
# enable code-mode (VAIS_CODE_MODE_ENABLED) and to reach the sidecar at localhost.
# Agents opt in per-manifest via spec.codeMode.enabled — enabling this only provisions
# the sidecar + maps the gateway endpoints; it does not change non-code-mode agents.
scriptRuntime:
  enabled: false
  image: vais-script-runtime:local
  imagePullPolicy: IfNotPresent
  # Pod-local port; must differ from the runtime's 8080 since they share localhost.
  port: 8090
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      memory: 256Mi

# v0.30 JWT bearer authentication. Off-by-default → existing localhost semantics
# unchanged. When jwtAuthority is set the full bearer-token pipeline is wired on
# the runtime host. serviceAccountPrincipalMapper swaps in the K8s SA mapper so
# system:serviceaccount:<namespace>:<sa> sub claims are split into Id + TenantId.
auth:
  # OIDC authority URL (e.g. https://keycloak.example.com/realms/my-realm).
  # Empty → auth pipeline disabled (VAIS_JWT_AUTHORITY unset).
  jwtAuthority: ""
  # Optional token audience restriction. Empty → audience validation disabled.
  jwtAudience: ""
  # When true, ServiceAccountPrincipalMapper is registered instead of
  # DefaultPrincipalMapper. Enable for K8s SA JWT tokens.
  serviceAccountPrincipalMapper: false

# Kubernetes Service fronting the pod(s). ClusterIP + HTTP 8080 by default;
# for LoadBalancer / NodePort set `service.type` accordingly.
service:
  type: ClusterIP
  port: 8080
  annotations: {}

# Graceful shutdown: how long Kubernetes waits after SIGTERM before SIGKILL.
# Must satisfy: max grain drain ≤ VAIS_SHUTDOWN_TIMEOUT_SECONDS (30) < terminationGracePeriodSeconds.
# The default 45 s leaves a 15 s safety net above the 30 s host timeout.
terminationGracePeriodSeconds: 45

# Probe timings — default tolerance is 60s (12 × 5s) on readiness to cover
# the measured ~14s P99 silo-join time in clustered mode with 4× safety. Tune
# `readinessProbe.failureThreshold` upward for larger clusters that may
# converge slower; localhost mode needs neither headroom.
livenessProbe:
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 3
  failureThreshold: 3
readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 12

# Resource requests + limits. Leave `limits.cpu` unset (no CPU throttling on
# bursty silo traffic) unless your platform requires it.
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

# ServiceAccount creation.
serviceAccount:
  create: true
  annotations: {}
  name: ""

# RBAC. pluginSupervision grants the runtime ServiceAccount `get` + `patch` on
# apps/v1/deployments (cluster-wide) so KubernetesContainerSupervisor can
# roll out new plugin images. Set create=false to manage RBAC externally.
rbac:
  create: true
  pluginSupervision: false

# Pod-level security context. Matches the Dockerfile's non-root uid/gid.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# Container-level security context. readOnlyRootFilesystem relies on the
# writable emptyDir mounted at /tmp (see deployment template).
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

# Extra labels + annotations merged onto all resources / pod spec.
labels: {}
podAnnotations: {}

# Image pull secrets (when using a private registry).
imagePullSecrets: []

# Name overrides — standard Helm boilerplate.
nameOverride: ""
fullnameOverride: ""

# Scheduling knobs.
nodeSelector: {}
tolerations: []
affinity: {}
