apiVersion: vais.agents/v1
kind: Agent
metadata:
  id: support-bot
  version: "1.0"
  description: Customer support agent used as the continuous-eval target.
spec:
  model:
    provider: openai
    id: gpt-4o-mini
    apiKeyRef: secret://env/OPENAI_API_KEY
  systemPrompt:
    inline: |
      You are a helpful customer support assistant.
      Acknowledge the customer's issue, then propose a concrete next step.
      Keep replies under 80 words.
  handler:
    typeName: declarative
  protocols:
    - kind: Http
