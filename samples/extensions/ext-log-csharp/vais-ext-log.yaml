apiVersion: vais.agents/v1
kind: Extension
metadata:
  name: ext-log-csharp
  version: "1.0.0"
  description: "Logs every agent input turn and every LLM response."
  labels:
    team: platform
    sample: "true"
spec:
  host: csharp
  handlers:
    - id: log-input
      seam: agentInput
      priority: 900
      failureMode: log
    - id: log-output
      seam: agentOutput
      priority: 900
      failureMode: log
