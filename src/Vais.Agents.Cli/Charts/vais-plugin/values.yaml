## Default values for vais-plugin.
## Override with --set or -f <file>.

## Plugin name — used as the Deployment/Service name and label selector.
pluginName: my-plugin

## Container image to deploy.
image:
  repository: my-registry/my-plugin
  tag: latest
  pullPolicy: IfNotPresent

## Number of replicas.
replicaCount: 1

## Container port the plugin listens on (VAIS_PLUGIN_PORT).
pluginPort: 8080

## Resource limits and requests.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

## Pod-level security context (P12 isolation defaults — override to relax for specific plugins).
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

## Container-level security context.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

## Extra environment variables passed to the container.
env: []
# - name: MY_SECRET
#   valueFrom:
#     secretKeyRef:
#       name: my-secret
#       key: value

## Image pull secrets.
imagePullSecrets: []

## NetworkPolicy (P12 egress isolation — enabled by default).
## Allows ingress only from the runtime service and egress only to the runtime + DNS.
networkPolicy:
  enabled: true
  ## The runtime service that is allowed to call this plugin (ingress) and that the plugin
  ## may call back (egress). Adjust namespace/name/port to match your runtime deployment.
  runtimeService:
    namespace: vais-system
    name: vais-agents-runtime
    port: 8080
    ## Internal port of the runtime service (OTLP + container-gateway callbacks).
    ## Must match the port the runtime binds for its internal API (default 5001).
    internalPort: 5001
  ## Extra egress rules appended verbatim (e.g. to allow outbound to a database).
  ## Each entry follows the Kubernetes NetworkPolicyEgressRule schema.
  extraEgress: []

## OTLP telemetry (P12 optional-outbound — opt-in).
## When enabled, the plugin container is configured to export OpenTelemetry spans to
## the runtime's OTLP receiver so they appear alongside the graph-node span in Langfuse.
otlp:
  enabled: false
  ## OTLP HTTP endpoint on the runtime's internal port (the /v1/otlp prefix is the receiver route).
  endpoint: "http://vais-agents-runtime.vais-system.svc.cluster.local:5001/v1/otlp"
  ## Optional: reference a Kubernetes Secret that holds the Authorization header value
  ## (e.g. "vais-plugin-token <hmac-token>").  If absent, inject the header via env directly.
  headersSecretRef: {}
  #   name: my-plugin-otlp-token
  #   key: authorization
