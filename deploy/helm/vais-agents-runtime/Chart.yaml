  - llm
  - orleans
  - kubernetes
  - runtime
home: https://example.invalid/vais-agents
maintainers:
  - name: VAIS contributors
# Intentionally empty — consumers bring their own Redis (Bitnami subchart,
# managed cloud, platform-team). Bundling a Redis subchart adds friction for
# organisations that already have one.
dependencies: []
