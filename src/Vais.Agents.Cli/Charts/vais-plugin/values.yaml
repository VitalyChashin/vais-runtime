## Default values for vais-plugin.
## Override with --set or -f <file>.

## Plugin name — used as the Deployment/Service name and label selector.
pluginName: my-plugin

## Container image to deploy.
image:
  repository: my-registry/my-plugin
  tag: latest
  pullPolicy: IfNotPresent

## Number of replicas.
replicaCount: 1

## Container port the plugin listens on (VAIS_PLUGIN_PORT).
pluginPort: 8080

## Resource limits and requests.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

## Pod-level security context (P12 isolation defaults — override to relax for specific plugins).
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

## Container-level security context.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

## Extra environment variables passed to the container.
env: []
# - name: MY_SECRET
#   valueFrom:
#     secretKeyRef:
#       name: my-secret
#       key: value

## Image pull secrets.
imagePullSecrets: []

## NetworkPolicy (P12 egress isolation — enabled by default).
## Allows ingress only from the runtime service and egress only to the runtime + DNS.
networkPolicy:
  enabled: true
  ## The runtime service that is allowed to call this plugin (ingress) and that the plugin
  ## may call back (egress). Adjust namespace/name/port to match your runtime deployment.
  runtimeService:
    namespace: vais-system
    name: vais-agents-runtime
    port: 8080
  ## Extra egress rules appended verbatim (e.g. to allow outbound to a database).
  ## Each entry follows the Kubernetes NetworkPolicyEgressRule schema.
  extraEgress: []
