# CustomResourceDefinition for the Vais.Agents operator (v0.13.0-preview).
#
# v0.13 ships a minimal hand-rolled schema: top-level `spec` carries
# `x-kubernetes-preserve-unknown-fields: true` so the full AgentManifest
# field set round-trips without per-field OpenAPI validation. KubeOps
# 10.3.4's auto-transpiler is blocked on `TimeSpan` properties in the
# reachable type graph (AutoscalingSpec.IdleTtl + RunBudget.MaxDuration,
# both in Vais.Agents.Abstractions). A later pillar tightens the schema
# once the upstream transpiler handles TimeSpan or we land operator-local
# mirror types.
#
# Status subresource is explicitly enabled so the operator can patch
# .status independently of .spec.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agents.vais.io
  annotations:
    controller-gen.kubebuilder.io/version: "hand-rolled/v0.13.0-preview"
spec:
  group: vais.io
  scope: Namespaced
  names:
    kind: Agent
    listKind: AgentList
    plural: agents
    singular: agent
    shortNames:
      - vagent
      - vagents
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: AgentId
          type: string
          jsonPath: .spec.agentId
        - name: Version
          type: string
          jsonPath: .spec.version
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
              required:
                - agentId
                - version
                - handler
                - protocols
                - tools
              properties:
                agentId:
                  type: string
                  description: Stable agent identifier; unique within the owning tenant.
                version:
                  type: string
                  description: Immutable version tag. Bumping this triggers UpdateAsync.
                handler:
                  type: object
                  description: Code / image reference the runtime instantiates.
                  x-kubernetes-preserve-unknown-fields: true
                protocols:
                  type: array
                  description: Protocol bindings the agent is exposed on.
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                tools:
                  type: array
                  description: Tools available to the agent.
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                preserveOnDelete:
                  type: boolean
                  default: false
                  description: >-
                    When true, CR deletion removes the vais.io/agent-deactivate
                    finalizer without calling EvictAsync on the runtime. Agent
                    runtime state persists for rebuild from a different source.
                secretRefs:
                  type: object
                  additionalProperties:
                    type: object
                    required:
                      - name
                      - key
                    properties:
                      name:
                        type: string
                      key:
                        type: string
                  description: >-
                    Kubernetes Secret references resolved by the operator before
                    calling the control plane. v0.13 uses this field for
                    validation only — resolved values are not currently injected
                    into the projected AgentManifest (runtime resolves secrets
                    via env:/file: URIs set directly in manifest fields).
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Creating
                    - Active
                    - Updating
                    - Error
                    - Terminating
                manifestRevision:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
                lastReconciledAt:
                  type: string
                  format: date-time
                lastError:
                  type: string
                agentHandle:
                  type: object
                  properties:
                    agentId:
                      type: string
                    version:
                      type: string
                    instanceId:
                      type: string
                      nullable: true
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      observedGeneration:
                        type: integer
                        format: int64
