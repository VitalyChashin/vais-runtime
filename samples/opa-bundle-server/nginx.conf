worker_processes 1;
events { worker_connections 1024; }

http {
    server {
        listen 8888;

        # Serve the bundle archive from the /bundles directory.
        location /bundle.tar.gz {
            root /bundles;
            default_type application/octet-stream;

            # Recommended: add an ETag / Last-Modified so OPA can use
            # conditional requests (If-None-Match) to skip re-downloading
            # an unchanged bundle.
            etag on;
        }

        # Health probe — OPA bundle service uses GET /health on the OPA
        # port, not the bundle server.  Expose a trivial /ready here for
        # readinessProbe in the Kubernetes Deployment.
        location /ready {
            return 200 "OK\n";
            default_type text/plain;
        }
    }
}
