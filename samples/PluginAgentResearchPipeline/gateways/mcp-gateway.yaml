apiVersion: vais.agents/v1
kind: McpGatewayConfig
metadata:
  id: research-mcp-gateway
  version: "1.0"
  description: >
    MCP tool gateway for the research pipeline — OTel tracing, per-minute rate
    limit, and response truncation on every tool call.
spec:
  middleware:
    - name: McpGatewayLogging
    - name: McpServerLogging
    - name: ToolOtel
    - name: ToolRateLimit
      params:
        callsPerMinute: 30
    - name: ToolResponseTruncation
      params:
        maxCharacters: 8192
