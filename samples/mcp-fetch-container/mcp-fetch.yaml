# Container MCP server: wraps the official mcp-server-fetch (PyPI) so the
# runtime can talk to it over streamableHttp.
#
# Apply with: vais apply -f samples/mcp-fetch-container/mcp-fetch.yaml
#   (or from this directory: vais apply -f mcp-fetch.yaml)
#
# Optional governance: bind to your McpGatewayConfig via spec.mcpGatewayRef
# (uncomment + reference your gateway id). The runtime applies the configured
# middleware (rate limit, OTel, truncation, etc.) to every tool call.

apiVersion: vais.agents/v1
kind: McpServer
metadata:
  id: mcp-fetch
  version: "1.0"
  description: HTTP fetch tool via MCP — official mcp-server-fetch wrapped in a streamableHttp bridge.
spec:
  transport: containerStdio
  # mcpGatewayRef: demo-mcp-governance
  container:
    build:
      context: .                          # relative to this file
      dockerfile: Dockerfile
    env:
      MCP_STDIO_CMD: "python -m mcp_server_fetch"
