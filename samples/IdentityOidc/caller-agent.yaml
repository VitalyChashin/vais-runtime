apiVersion: vais.agents/v1
kind: Agent
metadata:
  id: caller-agent
  version: "1.0"
  description: |
    Agent that lives on Runtime A (the caller runtime).
    Authenticates inbound requests via VAIS_JWT_AUTHORITY;
    used only for local warm-up / standalone testing.
spec:
  model:
    provider: openai
    name: gpt-4o-mini
  systemPrompt:
    inline: |
      You are a helpful assistant. Respond in one concise sentence.
  handler:
    typeName: declarative
  protocols:
    - kind: Http
  tools: []
