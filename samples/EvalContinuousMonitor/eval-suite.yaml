apiVersion: vais.agents/v1
kind: EvalSuite
metadata:
  name: support-bot-continuous
  version: "1.0"
spec:
  agentId: support-bot
  # Continuous mode: score 10% of production runs per hour.
  # Replace spec.cases with spec.sampling to activate continuous monitoring.
  sampling:
    rate: 0.10            # Sample 10% of production runs
    windowDuration: 1h    # Rotate eval_runs row every hour
  # Suite-level assertions applied to every sampled run.
  assertions:
    - kind: no-turn-failed
    - kind: response-regex
      params:
        # Response must be non-empty and contain at least 3 words.
        pattern: "\\S+\\s+\\S+\\s+\\S+"
    - kind: judge-score
      params:
        # Ask a judge model to rate helpfulness on [0, 1].
        prompt: >
          Rate the following support response from 0.0 to 1.0 based on how
          helpful and actionable it is for the customer.
          Response: {{response}}
          Output only a number.
        model: gpt-4o-mini    # Route through LlmGatewayConfig for caching
        threshold: 0.6
