{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.pluginName }}
  labels:
    app: {{ .Values.pluginName }}
spec:
  podSelector:
    matchLabels:
      app: {{ .Values.pluginName }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.runtimeService.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ .Values.networkPolicy.runtimeService.name }}
      ports:
        - port: {{ .Values.pluginPort }}
          protocol: TCP
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.runtimeService.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ .Values.networkPolicy.runtimeService.name }}
      ports:
        - port: {{ .Values.networkPolicy.runtimeService.port }}
          protocol: TCP
        {{- if .Values.otlp.enabled }}
        - port: {{ .Values.networkPolicy.runtimeService.internalPort }}
          protocol: TCP
        {{- end }}
  {{- if .Values.networkPolicy.extraEgress }}
    {{- toYaml .Values.networkPolicy.extraEgress | nindent 4 }}
  {{- end }}
{{- end }}
