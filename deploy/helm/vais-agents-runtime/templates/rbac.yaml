{{- if and .Values.rbac.create .Values.rbac.pluginSupervision }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "vais-agents-runtime.fullname" . }}-plugin-supervisor
  labels:
    {{- include "vais-agents-runtime.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "vais-agents-runtime.fullname" . }}-plugin-supervisor
  labels:
    {{- include "vais-agents-runtime.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "vais-agents-runtime.fullname" . }}-plugin-supervisor
subjects:
  - kind: ServiceAccount
    name: {{ include "vais-agents-runtime.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
